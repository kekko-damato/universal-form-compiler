<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Compilatore (Universale)</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      color: #0a0a0a;
      background: #ffffff;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .logo {
      width: 34px; height: 34px; border-radius: 8px;
      background: #0a0a0a;
      color: #ffffff; display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 11px; letter-spacing: 0.5px;
    }
    h1 { margin: 0; font-size: 13px; font-weight: 600; }
    .subtitle { margin: 0; font-size: 10.5px; color: #6b6b6b; }
    .status {
      padding: 7px 10px; border-radius: 5px; font-size: 11.5px;
      margin-bottom: 10px;
      background: #f5f5f5; border: 1px solid #e5e5e5;
    }
    .status.ok   { color: #0a7a3e; }
    .status.warn { color: #b07e00; }
    .actions { display: flex; flex-direction: column; gap: 5px; }
    button {
      width: 100%; padding: 8px 10px; border-radius: 5px;
      border: 1px solid #e5e5e5; background: #f5f5f5; color: #0a0a0a;
      cursor: pointer; font-weight: 600; font-size: 11.5px;
      font-family: inherit;
    }
    button:hover { background: #ebebeb; }
    button.primary {
      background: #0a0a0a; color: #ffffff; border-color: #0a0a0a;
    }
    button.primary:hover { background: #1a1a1a; }
    .footer {
      margin-top: 10px; font-size: 10.5px; color: #9a9a9a; text-align: center;
    }
    code {
      background: #f5f5f5;
      padding: 1px 5px; border-radius: 3px;
      font-size: 10.5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">U</div>
    <div>
      <h1>Compilatore (Universale)</h1>
      <p class="subtitle">v3.4.0</p>
    </div>
  </div>

  <div id="status" class="status"></div>

  <div class="actions">
    <button id="toggle" class="primary">Apri/chiudi widget</button>
    <button id="options">Impostazioni del widget ⚙</button>
  </div>

  <div class="footer">Funziona su <b>qualsiasi sito web</b></div>

  <script src="popup.js"></script>
</body>
</html>
